<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XO Media Billing</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Poppins;
color:#fff;
}

/* TOP */
.top{
height:55px;
display:flex;
align-items:center;
padding:0 12px;
background:#111;
border-bottom:1px solid #222;
}

.logo{
width:34px;
height:34px;
border-radius:8px;
margin-right:8px;
object-fit:cover;
box-shadow:0 0 10px rgba(255,255,255,.6);
}

.brand{
font-family:'Bebas Neue';
font-size:24px;
letter-spacing:2px;
}

/* FORM */
.card{
width:82%;
max-width:300px;
margin:18px auto;
background:#1a1a1a;
padding:15px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.6);
}

.title{
text-align:center;
font-size:15px;
margin-bottom:10px;
}

label{
font-size:11px;
opacity:.7;
}

input{
width:92%;
padding:9px;
border:none;
border-radius:18px;
margin:5px auto 10px;
font-size:12px;
display:block;
transition:.3s;
}

input:focus{
outline:none;
box-shadow:0 0 10px rgba(255,255,255,.6);
}

.gen{
width:92%;
margin:auto;
padding:10px;
border:none;
border-radius:22px;
background:linear-gradient(45deg,#666,#222);
color:#fff;
font-size:14px;
}

/* INVOICE */
.invoice{
background:#fff;
color:#000;
width:260px;
margin:20px auto;
padding:18px;
border-radius:12px;
font-size:13px;
line-height:1.6;
text-align:left;
}

.invLogo{
width:50px;
display:block;
margin:auto;
margin-bottom:6px;
}

.invoice h2{
text-align:center;
font-family:'Bebas Neue';
letter-spacing:2px;
margin:0 0 10px;
}

/* BUTTON ROW */
.btnRow{
width:260px;
margin:8px auto 20px;
display:flex;
justify-content:space-between;
}

.action{
flex:1;
margin:0 4px;
padding:8px 0;
border:none;
border-radius:16px;
background:#111;
color:#fff;
font-size:13px;
}

/* NOTIFICATION */
.notify{
position:fixed;
top:-60px;
left:50%;
transform:translateX(-50%);
background:#fff;
color:#000;
padding:10px 20px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.5);
transition:.4s;
font-size:13px;
z-index:999;
}

.show{
top:15px;
}

</style>
</head>

<body>

<div class="notify" id="note">Done</div>

<div class="top">
<img src="xo/image.png" class="logo">
<div class="brand">XO MEDIA</div>
</div>

<div class="card">

<div class="title">Live Billing Statement</div>

<label>Member Name</label>
<input id="name" placeholder="Enter name">

<label>Total Live Unit</label>
<input id="unit" type="number" placeholder="Enter total unit">

<label>Live Rate (Max ₹6)</label>
<input id="rate" type="number" placeholder="Enter rate">

<label>UPI ID</label>
<input id="upi" placeholder="example@upi">

<button class="gen" onclick="createBill()">Generate Bill</button>

</div>

<div id="output"></div>

<script>

function notify(msg){
let n=document.getElementById("note")
n.innerText=msg
n.classList.add("show")
setTimeout(()=>n.classList.remove("show"),2000)
}

/* RATE LIMIT */
document.getElementById("rate").addEventListener("input",function(){
if(this.value>6){
this.value=6
notify("Max Rate ₹6 Allowed ❌")
}
})

function createBill(){

let name=document.getElementById("name").value
let unit=document.getElementById("unit").value
let rate=document.getElementById("rate").value
let upi=document.getElementById("upi").value

if(!name||!unit||!rate||!upi){
notify("Fill all details ❌")
return
}

let total=unit*rate
let today=new Date().toLocaleDateString()
let invoice=Math.floor(Math.random()*99999)

document.getElementById("output").innerHTML=`

<div id="billImage" class="invoice">

<img src="xo/image.png" class="invLogo">
<h2>XO MEDIA</h2>

Invoice ID: ${invoice}<br>
Date: ${today}<br><br>

Client: ${name}<br>
Total Live Units: ${unit}<br>
Approved Rate: ₹${rate}<br>
UPI ID: ${upi}<br>
-------------------------<br>
<b>Total Payable: ₹${total}</b><br><br>

Powered by xo media

</div>

<div class="btnRow">
<button class="action" onclick="shareBill('${name}','${unit}','${rate}','${total}','${upi}',${invoice},'${today}')">Share</button>
<button class="action" onclick="downloadBill()">Download</button>
</div>
`

notify("Bill Generated ✅")

}

function shareBill(n,u,r,t,upi,i,d){

let msg=`XO MEDIA - Billing Statement

Invoice ID: ${i}
Date: ${d}

Client: ${n}
Total Live Units: ${u}
Approved Rate: ₹${r}
UPI ID: ${upi}
-------------------------
Total Payable: ₹${t}

Powered by xo media`

window.open("https://wa.me/?text="+encodeURIComponent(msg))

notify("Opening WhatsApp 📤")

}

function downloadBill(){

html2canvas(document.getElementById("billImage")).then(canvas=>{
let link=document.createElement("a")
link.download="XO_Bill.png"
link.href=canvas.toDataURL()
link.click()
})

notify("Image Downloaded ✅")

}

</script>

</body>
</html>
